name: sanal_mahkeme
description: "Haklı Kim ? - AI destekli tartışma analiz uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # AI & OCR
  google_mlkit_text_recognition: ^0.13.1
  http: ^1.2.0
  
  # Image & Media
  image_picker: ^1.1.2
  screenshot: ^3.0.0
  
  # Sharing
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  
  # Ads (AdMob) - INTERSTITIAL REKLAM
  google_mobile_ads: ^5.2.0
  
  # State Management & Utils
  # provider: ^6.1.2 (kullanılmıyor - tüm servisler singleton)
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  
  # UI Animations
  lottie: ^3.1.3
  shimmer: ^3.0.0
  animations: ^2.0.11
  smooth_page_indicator: ^2.0.1
  
  # Optional: Sentry for error tracking (free tier)
  sentry: ^9.20.0
  
  # Features
  in_app_review: ^2.0.11
  package_info_plus: ^9.0.0
  crypto: ^3.0.7
  speech_to_text: ^7.1.0
  local_auth: ^2.3.0
  flutter_animate: ^4.5.0
  connectivity_plus: ^6.0.0
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  flutter_tts: ^4.2.5
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
  generate: true

  # Assets
  assets:
    - assets/images/
    - assets/lottie/
    
  # Fonts (Opsiyonel - daha sonra eklenebilir)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
